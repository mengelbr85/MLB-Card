<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLB Weather Impact Card</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; padding: 24px 12px;
    }
    h1 { color: #fff; font-size: 1.4rem; margin-bottom: 4px; letter-spacing: 1px; }
    .subtitle { color: #aaa; font-size: 0.75rem; margin-bottom: 18px; text-align: center; }

    .controls {
      display: flex; gap: 10px; flex-wrap: wrap;
      justify-content: center; margin-bottom: 14px; width: 100%; max-width: 600px;
    }
    .controls select {
      padding: 10px 16px; border-radius: 8px; border: 1px solid #0f3460;
      font-size: 0.88rem; background: #16213e; color: #fff; flex: 1; min-width: 200px;
    }

    .wx-panel {
      background: #16213e; border: 1px solid #0f3460; border-radius: 12px;
      padding: 16px 18px; width: 100%; max-width: 600px; margin-bottom: 16px;
    }
    .wx-panel h3 {
      color: #4fc3f7; font-size: 0.78rem; letter-spacing: 1.5px;
      text-transform: uppercase; margin-bottom: 12px;
    }
    .wx-grid-input {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px;
    }
    .wx-field label {
      display: block; color: #aaa; font-size: 0.68rem;
      margin-bottom: 3px; letter-spacing: 0.5px; text-transform: uppercase;
    }
    .wx-field input, .wx-field select {
      width: 100%; padding: 8px 10px; border-radius: 6px;
      border: 1px solid #0f3460; background: #0f1e3c; color: #fff; font-size: 0.85rem;
    }
    .gen-btn {
      width: 100%; padding: 10px; background: #e94560; color: #fff;
      border: none; border-radius: 8px; font-size: 0.9rem; font-weight: bold;
      cursor: pointer; transition: background 0.2s; letter-spacing: 0.5px;
    }
    .gen-btn:hover { background: #c73652; }

    /* Card */
    .card { width: 100%; max-width: 520px; border-radius: 18px;
      overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,0.5); display: none; }
    .card.visible { display: block; }

    .card-header {
      background: linear-gradient(135deg, #0f3460, #16213e);
      padding: 18px 22px 14px; color: #fff;
    }
    .card-header .matchup { font-size: 1.9rem; font-weight: 900; letter-spacing: 1px; }
    .card-header .venue-time {
      font-size: 0.75rem; font-weight: 700; color: #4fc3f7;
      letter-spacing: 2px; margin-top: 2px;
    }

    .weather-row {
      background: #f7f9fc; padding: 14px 20px;
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .wx-icon { font-size: 2.2rem; min-width: 40px; text-align: center; }
    .wx-grid-disp { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 20px; flex: 1; }
    .wx-item { font-size: 0.82rem; color: #333; }
    .wx-item .val { font-weight: 900; font-size: 1.1rem; color: #111; }
    .wx-condition { margin-left: auto; text-align: right; }
    .wx-condition .cond-label { font-weight: 900; font-size: 0.95rem; color: #2196f3; }
    .wx-condition .sample { font-size: 0.68rem; color: #888; margin-top: 2px; }

    /* Physics strip */
    .physics-row {
      background: #e3f2fd; padding: 10px 14px;
      display: flex; gap: 10px; border-top: 1px solid #bbdefb;
      align-items: stretch;
    }
    .physics-diagram {
      flex: 0 0 auto; border-radius: 8px; overflow: hidden;
      border: 1px solid #bbdefb; line-height: 0;
    }
    .physics-stats {
      flex: 1; display: flex; flex-direction: column; gap: 8px;
    }
    .phys-box {
      flex: 1; background: #fff; border-radius: 8px;
      padding: 7px 10px; border: 1px solid #bbdefb;
    }
    .phys-label {
      font-size: 0.58rem; font-weight: 800; letter-spacing: 1.5px;
      color: #1565c0; text-transform: uppercase; display: block;
    }
    .phys-value {
      font-size: 1.0rem; font-weight: 900; display: block; margin: 2px 0;
    }
    .phys-pos  { color: #2e7d32; }
    .phys-neg  { color: #c62828; }
    .phys-neu  { color: #555; }
    .phys-sub  { font-size: 0.58rem; color: #666; }

    .section-label {
      background: #eef1f6; padding: 7px 20px;
      font-size: 0.65rem; font-weight: 800; letter-spacing: 2px; color: #888;
    }

    .data-quality {
      background: #f7f9fc; padding: 5px 16px;
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    }
    .dq-badge {
      font-size: 0.62rem; font-weight: 700; padding: 2px 8px;
      border-radius: 20px; letter-spacing: 0.5px;
    }
    .dq-real  { background: #c8e6c9; color: #1b5e20; }
    .dq-model { background: #fff9c4; color: #f57f17; }
    .dq-phys  { background: #bbdefb; color: #0d47a1; }

    .impact-row { background: #f7f9fc; padding: 12px 14px; display: flex; gap: 10px; }
    .impact-box { flex: 1; border-radius: 12px; padding: 11px 8px; text-align: center; }
    .impact-box.positive { background: #e8f5e9; }
    .impact-box.negative { background: #fce4ec; }
    .impact-box.neutral  { background: #f3f3f3; }
    .impact-box .impact-title { font-size: 0.6rem; font-weight: 800; letter-spacing: 1.5px; color: #555; }
    .impact-box.positive .impact-title { color: #2e7d32; }
    .impact-box.negative .impact-title { color: #c62828; }
    .impact-pct { font-size: 1.7rem; font-weight: 900; margin: 4px 0; }
    .positive .impact-pct { color: #2e7d32; }
    .negative .impact-pct { color: #c62828; }
    .neutral  .impact-pct { color: #555; }
    .impact-sub { display: flex; justify-content: space-around; gap: 4px; margin-top: 6px; }
    .impact-sub .sub-item { font-size: 0.58rem; color: #777; text-align: center; }
    .impact-sub .sub-item .sv { font-weight: 800; font-size: 0.7rem; color: #333; display: block; }
    .impact-sub .sub-item.hl .sv { color: #2e7d32; }

    .ou-section { background: #f7f9fc; padding: 12px 20px 16px; }
    .ou-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .ou-title { font-size: 0.65rem; font-weight: 800; letter-spacing: 2px; color: #888; }
    .ou-avg   { font-size: 0.78rem; color: #aaa; }
    .ou-bar-wrap { display: flex; border-radius: 40px; overflow: hidden; height: 54px; }
    .ou-under {
      background: #ede7f6; display: flex; flex-direction: column;
      justify-content: center; align-items: center; padding: 0 12px;
    }
    .ou-push {
      background: #e0e0e0; display: flex; flex-direction: column;
      justify-content: center; align-items: center; padding: 0 8px;
    }
    .ou-over {
      background: #1565c0; display: flex; flex-direction: column;
      justify-content: center; align-items: flex-end; padding: 0 14px;
      border-radius: 0 40px 40px 0; flex: 1;
    }
    .ou-label { font-size: 0.56rem; font-weight: 800; letter-spacing: 1px; }
    .ou-under .ou-label { color: #7c4dff; }
    .ou-push .ou-label  { color: #777; }
    .ou-over .ou-label  { color: rgba(255,255,255,0.8); }
    .ou-pct { font-size: 1.15rem; font-weight: 900; }
    .ou-under .ou-pct { color: #7c4dff; }
    .ou-push .ou-pct  { color: #666; }
    .ou-over .ou-pct  { color: #fff; }
    .ou-lean { font-size: 0.52rem; font-weight: 800; color: rgba(255,255,255,0.85); letter-spacing: 1px; margin-top: 1px; }

    .mlb-section { background: #f7f9fc; padding: 12px 20px 18px; border-top: 1px solid #e8e8e8; }
    .mlb-row { margin-bottom: 14px; }
    .mlb-row:last-child { margin-bottom: 0; }
    .mlb-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
    .mlb-name { font-size: 0.8rem; font-weight: 900; color: #333; }
    .mlb-avg-label { font-size: 0.7rem; color: #aaa; margin-left: 6px; }
    .mlb-pct { font-size: 0.85rem; font-weight: 900; }
    .mlb-pct.pos { color: #2e7d32; }
    .mlb-pct.neg { color: #c62828; }
    .bar-track { height: 10px; background: #ddd; border-radius: 10px; position: relative; }
    .bar-fill { height: 100%; border-radius: 10px; transition: width 0.6s ease; }
    .bar-fill.green { background: #4caf50; }
    .bar-fill.red   { background: #f44336; }
    .bar-marker {
      position: absolute; top: -3px; width: 5px; height: 16px;
      background: #888; border-radius: 3px; left: 50%; transform: translateX(-50%);
    }
    .bar-labels { display: flex; justify-content: space-between; margin-top: 3px; font-size: 0.58rem; color: #aaa; }

    /* ── HR Forecast Box ── */
    .hr-forecast {
      background: linear-gradient(135deg, #1a237e, #0d47a1);
      padding: 18px 20px 16px; text-align: center;
    }
    .hrf-label {
      font-size: 0.65rem; font-weight: 800; letter-spacing: 2.5px;
      color: #90caf9; text-transform: uppercase; display: block; margin-bottom: 8px;
    }
    .hrf-number {
      font-size: 5rem; font-weight: 900; color: #fff;
      line-height: 1; display: inline-block;
    }
    .hrf-unit {
      font-size: 1.1rem; font-weight: 700; color: #bbdefb;
      margin-left: 8px; vertical-align: middle;
    }
    .hrf-range {
      font-size: 0.8rem; color: #bbdefb; margin-top: 6px; display: block;
    }
    .hrf-env {
      font-size: 0.78rem; font-weight: 800; color: #fff; margin-top: 10px;
      padding: 5px 16px; background: rgba(255,255,255,0.18);
      border-radius: 20px; display: inline-block; letter-spacing: 0.5px;
    }
    .hrf-breakdown {
      font-size: 0.62rem; color: rgba(255,255,255,0.55);
      margin-top: 6px; display: block;
    }



    .data-note { font-size: 0.62rem; color: #777; text-align: center; padding: 6px 20px 14px; background: #f7f9fc; }

    /* Max HR Record */
    .maxhr-section { background: #fff8e1; padding: 12px 20px 14px; border-top: 2px solid #ffe082; }
    .maxhr-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .maxhr-title { font-size: 0.65rem; font-weight: 800; letter-spacing: 2px; color: #e65100; }
    .maxhr-date  { font-size: 0.7rem; font-weight: 700; color: #bf360c; }
    .maxhr-body  { display: flex; align-items: center; gap: 14px; }
    .maxhr-number { font-size: 3rem; font-weight: 900; color: #e65100; line-height: 1; min-width: 60px; text-align: center; }
    .maxhr-number span { display: block; font-size: 0.6rem; font-weight: 700; color: #bf360c; letter-spacing: 1px; margin-top: 2px; }
    .maxhr-conditions { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; }
    .maxhr-cond-item { font-size: 0.7rem; color: #555; }
    .maxhr-cond-item .cv { font-weight: 800; font-size: 0.82rem; color: #222; }
    .maxhr-sky { grid-column: 1 / -1; font-size: 0.7rem; color: #555; }
    .maxhr-sky .cv { font-weight: 800; font-size: 0.82rem; color: #222; }

    /* ── Pitcher Panel ── */
    .pitcher-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .pitcher-strip { background: #0f1e3c; border: 1px solid #1a3a6e; border-radius: 10px; padding: 10px 14px 12px; }
    .pitcher-strip h4 { color: #4fc3f7; font-size: 0.68rem; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
    .pitcher-strip select { width: 100%; padding: 7px 10px; border-radius: 6px; border: 1px solid #0f3460; background: #0a1628; color: #fff; font-size: 0.82rem; }
    .pitcher-row { background: #1a237e; padding: 10px 16px; display: flex; gap: 12px; align-items: stretch; border-top: 1px solid #283593; }
    .pitcher-box { flex: 1; background: rgba(255,255,255,0.08); border-radius: 8px; padding: 8px 10px; text-align: center; }
    .pitcher-box .p-role { font-size: 0.58rem; font-weight: 800; letter-spacing: 1.5px; color: #90caf9; display: block; margin-bottom: 3px; }
    .pitcher-box .p-name { font-size: 0.82rem; font-weight: 900; color: #fff; display: block; }
    .pitcher-box .p-hr9  { font-size: 0.72rem; color: #bbdefb; margin-top: 2px; display: block; }
    .pitcher-box .p-mod  { font-size: 0.68rem; font-weight: 800; margin-top: 3px; display: block; }
    .pitcher-box .p-mod.pos { color: #ef9a9a; }
    .pitcher-box .p-mod.neg { color: #a5d6a7; }
    .pitcher-box .p-mod.neu { color: #bbdefb; }
    .pitcher-combined { display: flex; flex-direction: column; justify-content: center; align-items: center; min-width: 80px; background: rgba(255,255,255,0.12); border-radius: 8px; padding: 8px 10px; }
    .pitcher-combined .pc-label { font-size: 0.55rem; font-weight: 800; letter-spacing: 1px; color: #90caf9; }
    .pitcher-combined .pc-val   { font-size: 1.3rem; font-weight: 900; color: #fff; }
    .pitcher-combined .pc-sub   { font-size: 0.58rem; color: #bbdefb; margin-top: 1px; }


    /* ── Poisson Distribution ── */
    .poisson-section { background: #f0f4f8; padding: 12px 16px 14px; }
    .poisson-header  { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
    .poisson-title   { font-size: 0.65rem; font-weight: 800; letter-spacing: 2px; color: #555; }
    .poisson-meta    { font-size: 0.68rem; color: #777; font-family: 'Courier New', monospace; }
    .poisson-row     { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
    .poisson-k       { font-size: 0.72rem; font-weight: 800; color: #444; min-width: 26px; text-align: right; font-family: 'Courier New', monospace; }
    .poisson-k.mode  { color: #0d47a1; }
    .poisson-track   { flex: 1; height: 16px; background: #dde4ec; border-radius: 3px; overflow: hidden; }
    .poisson-fill    { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
    .poisson-fill.c0 { background: #0d47a1; }
    .poisson-fill.c1 { background: #1565c0; }
    .poisson-fill.c2 { background: #1976d2; }
    .poisson-fill.c3 { background: #1e88e5; }
    .poisson-fill.c4 { background: #42a5f5; }
    .poisson-fill.c5 { background: #90caf9; }
    .poisson-pct     { font-size: 0.70rem; font-weight: 700; color: #333; min-width: 44px; text-align: right; font-family: 'Courier New', monospace; }
    .poisson-pct.mode{ color: #0d47a1; }
    .poisson-cum     { font-size: 0.62rem; color: #999; min-width: 58px; text-align: right; font-family: 'Courier New', monospace; }


    /* ── Sensitivity Analysis (Table) ── */
    .sens-section { background: #f7f9fc; padding: 12px 16px 16px; border-top: 1px solid #e8e8e8; }
    .sens-meta    { font-size: 0.63rem; color: #999; margin-bottom: 10px; font-family: 'Courier New', monospace; }
    .sens-table   { width: 100%; border-collapse: collapse; font-size: 0.68rem; }
    .sens-table th {
      background: #e8eef5; color: #444; font-size: 0.60rem; font-weight: 800;
      letter-spacing: 1px; text-transform: uppercase;
      padding: 5px 8px; text-align: left; border-bottom: 2px solid #c8d4e0;
    }
    .sens-table th.num { text-align: right; }
    .sens-table td     { padding: 5px 8px; border-bottom: 1px solid #e4eaf0; color: #333; vertical-align: middle; }
    .sens-table td.num { text-align: right; font-family: 'Courier New', monospace; font-size: 0.67rem; }
    .sens-table tr:last-child td { border-bottom: none; }
    .sens-table tr:hover td      { background: #eef2f7; }
    .sens-pos-val { color: #2e7d32; font-weight: 800; }
    .sens-neg-val { color: #c62828; font-weight: 800; }
    .sens-swing   { color: #1565c0; font-weight: 800; }
    .sens-rank    { display: inline-block; background: #1565c0; color: #fff;
                    border-radius: 10px; width: 16px; height: 16px; line-height: 16px;
                    text-align: center; font-size: 0.58rem; font-weight: 800; margin-right: 4px; }


    /* ── Market Odds Section ── */
    .market-section { background: #fff8e1; padding: 12px 16px 14px; border-top: 2px solid #ffe082; }
    .market-header  { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
    .market-title   { font-size: 0.65rem; font-weight: 800; letter-spacing: 2px; color: #e65100; }
    .market-asof    { font-size: 0.62rem; color: #aaa; font-family: 'Courier New', monospace; }
    .market-table   { width: 100%; border-collapse: collapse; font-size: 0.72rem; }
    .market-table td { padding: 4px 6px; border-bottom: 1px solid #ffe082; color: #333; }
    .market-table td.num { text-align: right; font-family: 'Courier New', monospace; font-weight: 700; }
    .market-table tr:last-child td { border-bottom: none; }
    .market-label   { font-size: 0.60rem; color: #888; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .gap-pos { color: #2e7d32; font-weight: 800; }
    .gap-neg { color: #c62828; font-weight: 800; }
    .gap-neu { color: #888;    font-weight: 700; }
    .no-game { font-size: 0.68rem; color: #aaa; text-align: center; padding: 8px; }

    .status-msg { color: #f48fb1; font-size: 0.82rem; text-align: center; margin-bottom: 10px; }
  </style>
</head>
<body>

<h1>⚾ MLB Weather Impact Card</h1>
<p class="subtitle">All 21 open-air MLB stadiums · 2026 Pitcher HR/9 · Weather physics calibrated · 2022–2024</p>

<div class="controls">
  <select id="stadiumSelect" onchange="onStadiumChange(this.value)">
    <option value="">— Select a Stadium —</option>
    <option value="yankee">Yankee Stadium (NYY)</option>
    <option value="fenway">Fenway Park (BOS)</option>
    <option value="wrigley">Wrigley Field (CHC)</option>
    <option value="busch">Busch Stadium (STL)</option>
    <option value="dodger">Dodger Stadium (LAD)</option>
    <option value="oracle">Oracle Park (SF)</option>
    <option value="camden">Camden Yards (BAL)</option>
    <option value="pnc">PNC Park (PIT)</option>
    <option value="great_american">Great American Ball Park (CIN)</option>
    <option value="coors">Coors Field (COL)</option>
    <option value="petco">Petco Park (SD)</option>
    <option value="progressive">Progressive Field (CLE)</option>
    <option value="comerica">Comerica Park (DET)</option>
    <option value="target">Target Field (MIN)</option>
    <option value="kauffman">Kauffman Stadium (KC)</option>
    <option value="guaranteed_rate">Guaranteed Rate Field (CWS)</option>
    <option value="citizens_bank">Citizens Bank Park (PHI)</option>
    <option value="citi_field">Citi Field (NYM)</option>
    <option value="nationals_park">Nationals Park (WSH)</option>
    <option value="truist">Truist Park (ATL)</option>
    <option value="angel">Angel Stadium (LAA)</option>
  </select>
</div>

<div class="wx-panel">
  <h3>🌤️ Current Weather Conditions</h3>
  <div class="wx-grid-input">
    <div class="wx-field">
      <label>Temp (°F)</label>
      <input type="number" id="w_temp" value="75" min="20" max="115">
    </div>
    <div class="wx-field">
      <label>Dew Point (°F)</label>
      <input type="number" id="w_dew" value="55" min="10" max="85">
    </div>
    <div class="wx-field">
      <label>Wind (mph)</label>
      <input type="number" id="w_wind" value="8" min="0" max="60">
    </div>
    <div class="wx-field">
      <label>Wind Direction</label>
      <select id="w_dir">
        <option>N</option><option>NNE</option><option>NE</option><option>ENE</option>
        <option>E</option><option>ESE</option><option>SE</option><option>SSE</option>
        <option selected>S</option><option>SSW</option><option>SW</option><option>WSW</option>
        <option>W</option><option>WNW</option><option>NW</option><option>NNW</option>
        <option>VAR</option>
      </select>
    </div>
    <div class="wx-field">
      <label>Sky Condition</label>
      <select id="w_sky">
        <option value="clear">☀️ Clear</option>
        <option value="few">🌤️ Mostly Sunny</option>
        <option value="scattered">⛅ Partly Cloudy</option>
        <option value="broken">🌥️ Mostly Cloudy</option>
        <option value="overcast">☁️ Overcast</option>
      </select>
    </div>
  </div>
  <div class="pitcher-grid">
    <div class="pitcher-strip">
      <h4>🏠 Home Starter</h4>
      <select id="p_home">
        <option value="avg">— League Avg SP (1.18 HR/9 · 2026) —</option>
      </select>
    </div>
    <div class="pitcher-strip">
      <h4>✈️ Away Starter</h4>
      <select id="p_away">
        <option value="avg">— League Avg SP (1.18 HR/9 · 2026) —</option>
      </select>
    </div>
  </div>
  <button class="gen-btn" onclick="generateCard()">⚡ Generate Weather Impact Card</button>
</div>

<div class="status-msg" id="statusMsg"></div>
<div class="card" id="card"></div>

<script>

// ── Pitcher Database ─────────────────────────────────────────────────────────
// HR/9 = home runs allowed per 9 innings, 2022-2024 combined average
// MLB avg SP HR/9 (2022-24): 1.25
// ── Pitcher Database ── Updated 2026-07-17 ──────────────────────────────────────
// HR/9 = home runs allowed per 9 IP · MLB avg SP HR/9 (2026): 1.18
// * = blended with prior estimate (IP < 40)
// ── Pitcher Database ── Updated 2026-07-17 ──────────────────────────────────────

function getPitcherHR9(selectId) {
  var val = document.getElementById(selectId).value;
  return val === 'avg' ? MLB_AVG_HR9 : parseFloat(val);
}

function getPitcherName(selectId) {
  var sel = document.getElementById(selectId);
  var opt = sel.options[sel.selectedIndex];
  return opt.text.split(' (')[0];
}

function calcPitcherModifier(homeHR9, awayHR9) {
  // Each pitcher's deviation from league avg, averaged across both starters
  var homeMod = (homeHR9 / MLB_AVG_HR9 - 1) * 100;
  var awayMod = (awayHR9 / MLB_AVG_HR9 - 1) * 100;
  return (homeMod + awayMod) / 2;
}


// ── Poisson PMF ──────────────────────────────────────────────────────────────
function logFact(k) {
  var r = 0;
  for (var i = 2; i <= k; i++) r += Math.log(i);
  return r;
}
function poissonPMF(lam, k) {
  if (lam <= 0) return k === 0 ? 1 : 0;
  return Math.exp(-lam + k * Math.log(lam) - logFact(k));
}
function buildPoissonSection(lam) {
  var probs = [], cumSum = 0;
  for (var k = 0; k <= 8; k++) { var p = poissonPMF(lam, k); probs.push(p); cumSum += p; }
  probs.push(Math.max(0, 1 - cumSum));  // 9+

  var maxP = Math.max.apply(null, probs);
  var mode = probs.indexOf(maxP);
  var sd   = Math.sqrt(lam);

  var s = '<div class="section-label">📊 HR PROBABILITY DISTRIBUTION</div>' +
    '<div class="poisson-section">' +
    '<div class="poisson-header">' +
    '<span class="poisson-title">P(EXACTLY k HOME RUNS THIS GAME)</span>' +
    '<span class="poisson-meta">λ=' + lam.toFixed(2) + ' · σ=' + sd.toFixed(2) + ' · mode=' + (mode < 9 ? mode : '9+') + '</span>' +
    '</div>';

  var cum = 0;
  for (var k = 0; k < probs.length; k++) {
    var p    = probs[k];
    cum += p;
    var label = k < 9 ? String(k) : '9+';
    var cumLabel = k < 9 ? '≤' + k + ': ' + (Math.min(cum, 1) * 100).toFixed(1) + '%'
                         : '    100.0%';
    var pct  = (p * 100).toFixed(1) + '%';
    var barW = (p / maxP * 93).toFixed(1);

    // Color class: 6 tiers based on fraction of max probability
    var frac = p / maxP;
    var colorClass = frac > 0.90 ? 'c0' : frac > 0.65 ? 'c1' : frac > 0.40 ? 'c2' :
                     frac > 0.20 ? 'c3' : frac > 0.08 ? 'c4' : 'c5';

    var isModeK = (k === mode);
    var kClass  = isModeK ? ' mode' : '';

    s += '<div class="poisson-row">' +
      '<span class="poisson-k' + kClass + '">' + label + '</span>' +
      '<div class="poisson-track">' +
        '<div class="poisson-fill ' + colorClass + '" style="width:' + barW + '%"></div>' +
      '</div>' +
      '<span class="poisson-pct' + kClass + '">' + pct + '</span>' +
      '<span class="poisson-cum">' + cumLabel + '</span>' +
    '</div>';
  }
  s += '</div>';
  return s;
}


// ── Sensitivity Analysis (Table) ────────────────────────────────────────────────
// For a given stadium, computes how much each input variable can shift
// condHR in isolation. All others held at neutral baseline:
//   72°F · 55°F dew · calm wind · scattered sky · avg pitching (MLB_AVG_HR9)
function buildSensitivitySection(s) {
  var B_TEMP = 72, B_DEW = 55, B_PITCH = MLB_AVG_HR9;
  var parkMult = s.parkHRPerGame / MLB_AVG.hrPerGame;
  var WIND_SPD = 20;

  function cHR(temp, dew, windMph, windDir, sky, pitchHR9) {
    var imp  = computeImpact(temp, windMph, windDir, sky, dew, s);
    var pMul = pitchHR9 / MLB_AVG_HR9;
    var wMul = 1 + imp.hrPct / 100;
    return MLB_AVG.hrPerGame * parkMult * pMul * wMul;
  }

  var base = cHR(B_TEMP, B_DEW, 0, 'VAR', 'scattered', B_PITCH);

  // Find best and worst wind direction for this park at WIND_SPD mph
  var DIRS = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  var bestDir = 'S', worstDir = 'N', bestWD = -99, worstWD = 99;
  for (var di = 0; di < DIRS.length; di++) {
    var wd = cHR(B_TEMP, B_DEW, WIND_SPD, DIRS[di], 'scattered', B_PITCH) - base;
    if (wd > bestWD)  { bestWD = wd;  bestDir  = DIRS[di]; }
    if (wd < worstWD) { worstWD = wd; worstDir = DIRS[di]; }
  }

  var rows = [
    { variable: 'Pitcher HR/9',
      bestCond:  'Homer-prone avg (2.50 HR/9)',
      worstCond: 'Ace avg (0.55 HR/9)',
      pos: cHR(B_TEMP, B_DEW, 0,'VAR','scattered', 2.50) - base,
      neg: cHR(B_TEMP, B_DEW, 0,'VAR','scattered', 0.55) - base },
    { variable: 'Wind (' + WIND_SPD + ' mph)',
      bestCond:  bestDir  + ' — blows out toward CF',
      worstCond: worstDir + ' — blows in from CF',
      pos: bestWD,
      neg: worstWD },
    { variable: 'Temperature',
      bestCond:  '105°F',
      worstCond: '40°F',
      pos: cHR(105, B_DEW, 0,'VAR','scattered', B_PITCH) - base,
      neg: cHR( 40, B_DEW, 0,'VAR','scattered', B_PITCH) - base },
    { variable: 'Sky Condition',
      bestCond:  'Clear / Mostly Sunny',
      worstCond: 'Overcast',
      pos: cHR(B_TEMP, B_DEW, 0,'VAR','clear',    B_PITCH) - base,
      neg: cHR(B_TEMP, B_DEW, 0,'VAR','overcast',  B_PITCH) - base },
    { variable: 'Dew Point',
      bestCond:  '75°F (humid)',
      worstCond: '30°F (dry)',
      pos: cHR(B_TEMP, 75, 0,'VAR','scattered', B_PITCH) - base,
      neg: cHR(B_TEMP, 30, 0,'VAR','scattered', B_PITCH) - base },
  ];

  // Sort by total swing — most impactful first
  rows.sort(function(a,b) {
    return (Math.abs(b.pos) + Math.abs(b.neg)) - (Math.abs(a.pos) + Math.abs(a.neg));
  });

  var html = '<div class="section-label">📋 SENSITIVITY ANALYSIS · ' + s.abbr + '</div>' +
    '<div class="sens-section">' +
    '<div class="sens-meta">Baseline: ' + base.toFixed(2) + ' HR/gm · 72°F · calm wind · avg pitching · all others held neutral while each variable is tested</div>' +
    '<table class="sens-table">' +
    '<thead><tr>' +
      '<th>#</th>' +
      '<th>Variable</th>' +
      '<th>Best Condition for HRs</th>' +
      '<th class="num">+HR/gm</th>' +
      '<th>Worst Condition for HRs</th>' +
      '<th class="num">−HR/gm</th>' +
      '<th class="num">Swing</th>' +
    '</tr></thead>' +
    '<tbody>';

  for (var i = 0; i < rows.length; i++) {
    var r     = rows[i];
    var swing = Math.abs(r.pos) + Math.abs(r.neg);
    var posStr   = '+' + r.pos.toFixed(2);
    var negStr   = r.neg.toFixed(2);
    var swingStr = swing.toFixed(2);

    html += '<tr>' +
      '<td><span class="sens-rank">' + (i+1) + '</span></td>' +
      '<td><strong>' + r.variable + '</strong></td>' +
      '<td>' + r.bestCond  + '</td>' +
      '<td class="num"><span class="sens-pos-val">' + posStr   + '</span></td>' +
      '<td>' + r.worstCond + '</td>' +
      '<td class="num"><span class="sens-neg-val">' + negStr   + '</span></td>' +
      '<td class="num"><span class="sens-swing">'   + swingStr + '</span></td>' +
    '</tr>';
  }

  html += '</tbody></table></div>';
  return html;
}

// ── Wind direction → degrees (meteorological: where wind is FROM) ─────────────
const DIR_DEG = {
  N:0, NNE:22.5, NE:45, ENE:67.5, E:90, ESE:112.5, SE:135, SSE:157.5,
  S:180, SSW:202.5, SW:225, WSW:247.5, W:270, WNW:292.5, NW:315, NNW:337.5, VAR:null
};

// ── Physics: Air Density ──────────────────────────────────────────────────────
// Returns air density in kg/m³ using the ideal gas law for moist air
function calcAirDensity(tempF, dewF, altFt) {
  var tempC = (tempF - 32) * 5 / 9;
  var dewC  = (dewF  - 32) * 5 / 9;
  var altM  = altFt * 0.3048;
  var T     = tempC + 273.15;                        // Kelvin

  // Atmospheric pressure at altitude (Barometric formula, Pa)
  var P = 101325 * Math.pow(1 - 2.2558e-5 * altM, 5.2559);

  // Vapor pressure at dew point — Magnus formula (Pa)
  var Pv = 611.2 * Math.exp(17.67 * dewC / (dewC + 243.5));
  Pv = Math.min(Pv, P * 0.97);                      // physical cap

  var Pd = P - Pv;                                   // dry air partial pressure
  var Rd = 287.058, Rv = 461.495;                    // specific gas constants
  return (Pd / (Rd * T)) + (Pv / (Rv * T));          // kg/m³
}

// ── Physics: Park-specific wind vector ───────────────────────────────────────
// Returns wind component toward center field (mph)
//   positive = blowing OUT (tailwind for fly balls → more HRs)
//   negative = blowing IN  (headwind for fly balls → fewer HRs)
//   near zero = crosswind
function calcWindOutComponent(windMph, windDirStr, cfBearing) {
  if (windMph === 0 || windDirStr === 'VAR') return 0;
  var fromDeg = DIR_DEG[windDirStr];
  if (fromDeg == null) return 0;
  // Convert "coming FROM" to "blowing TOWARD"
  var towardDeg = (fromDeg + 180) % 360;
  // Angle between wind-toward and CF bearing (normalized to -180..180)
  var diff = towardDeg - cfBearing;
  while (diff >  180) diff -= 360;
  while (diff < -180) diff += 360;
  return windMph * Math.cos(diff * Math.PI / 180);
}

// ── Physics: Combined impact model ───────────────────────────────────────────
function computeImpact(tempF, windMph, windDir, skyKey, dewF, stadium) {
  // --- Air density component ---
  // Compare today's conditions vs a neutral park day (70°F, dew 50°F) at this park's altitude
  // This keeps altitude as part of the park character while isolating today's weather effect
  var rhoNeutral = calcAirDensity(70, 50, stadium.altFt);
  var rhoToday   = calcAirDensity(tempF, dewF, stadium.altFt);
  var densityRatio = rhoToday / rhoNeutral;         // < 1 → less dense → more HRs

  // EMPIRICALLY DERIVED from 1,171 game-days across 5 parks (2022-2024)
  // Regression: HR ~ air_density + wind_out_component
  // r(density, HR) = 0.031 overall; up to 0.205 at Great American Ball Park
  // Empirical coefficient: ~0.42% HR change per 1% density change (multiplier 42)
  // Wind validated at ~0.92% HR per mph outfield component (multiplier kept at 1.0)
  var densityHRPct  = (1 - densityRatio) * 42;
  var densityRunPct = (1 - densityRatio) * 28;
  var densityKSPct  = (densityRatio - 1) * 7;

  // --- Park-specific wind vector component ---
  var windOut = calcWindOutComponent(windMph, windDir, stadium.cfBearing);
  // Research basis: ~1% HR change per mph of outfield wind component (Wrigley studies)
  var windHRPct  = windOut * 1.0;
  var windRunPct = windOut * 0.6;
  var windKSPct  = -Math.abs(windMph) * 0.07;       // any wind disrupts pitch control slightly

  // --- Sky / visibility component ---
  var skyHRPct = 0, skyRunPct = 0, skyKSPct = 0;
  if (skyKey === 'overcast' || skyKey === 'broken') {
    skyHRPct = -1.5; skyRunPct = -1.0; skyKSPct = 0.8;
  } else if (skyKey === 'clear' || skyKey === 'few') {
    skyHRPct = 1.0; skyRunPct = 0.5;
  }

  return {
    hrPct:        Math.round(densityHRPct  + windHRPct  + skyHRPct),
    runPct:       Math.round(densityRunPct + windRunPct + skyRunPct),
    ksPct:        Math.round(densityKSPct  + windKSPct  + skyKSPct),
    // Physics details for the card display
    densityPct:   Math.round((1 - densityRatio) * 1000) / 10,  // % difference from neutral
    rhoToday:     Math.round(rhoToday * 1000) / 1000,           // kg/m³
    windOut:      Math.round(windOut * 10) / 10,                // mph toward/from CF
  };
}

function computeOU(runPct, baseTotal) {
  var adj   = parseFloat((baseTotal * (1 + runPct / 100)).toFixed(1));
  var over  = Math.min(58, Math.max(30, 42 + runPct * 0.4));
  var under = Math.min(50, Math.max(15, 35 - runPct * 0.35));
  var push  = Math.max(0, Math.round(100 - over - under));
  return { over: Math.round(over), under: Math.round(under), push: push, avgTotal: adj };
}

function barW(v) { var c = Math.min(30, Math.max(-30, v)); return 50 + (c >= 0 ? 1 : -1) * Math.abs(c) / 30 * 46; }

function mlbRow(label, avg, pctVal, bw) {
  var isPos = pctVal >= 0;
  return '<div class="mlb-row">' +
    '<div class="mlb-top">' +
      '<div><span class="mlb-name">' + label + '</span><span class="mlb-avg-label">MLB avg ' + avg + '/gm</span></div>' +

      '<div class="bar-marker"></div>' +
    '</div>' +
    '<div class="bar-labels"><span>below avg</span><span>avg</span><span>above avg</span></div>' +
  '</div>';
}

// ── Stadium SVG Diagram ──────────────────────────────────────────────────────
// Draws a low-res overhead field diagram with compass + wind arrow.
// CF is always rendered at the top; the compass rotates to match reality.
function drawStadiumSVG(windMph, windDir, cfBearing, windOut) {
  var W = 160, H = 150;
  var cx = 80, hpY = 132;         // center-x, home plate y
  var moundY = 102;               // pitcher's mound y

  // Wind arrow direction (SVG: up = -Y = toward CF in this diagram)
  var arrowSVG = '';
  if (windMph > 0 && windDir !== 'VAR') {
    var fromDeg   = DIR_DEG[windDir];
    if (fromDeg != null) {
      var towardDeg   = (fromDeg + 180) % 360;
      var diagramDeg  = ((towardDeg - cfBearing) + 360) % 360;
      var rad         = diagramDeg * Math.PI / 180;
      var dx          = Math.sin(rad);
      var dy          = -Math.cos(rad);
      var arrowLen    = Math.min(46, Math.max(14, windMph * 2.2));
      var tx          = cx + dx * arrowLen;
      var ty          = moundY + dy * arrowLen;
      var color       = windOut >  3 ? '#43a047' :
                        windOut < -3 ? '#e53935' : '#fb8c00';
      var glow        = windOut >  3 ? '#a5d6a7' :
                        windOut < -3 ? '#ef9a9a' : '#ffe0b2';
      // Arrow shaft + head
      arrowSVG =
        '<defs>' +
          '<marker id="ah" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">' +
            '<polygon points="0 0,7 2.5,0 5" fill="' + color + '"/>' +
          '</marker>' +
        '</defs>' +
        '<line x1="' + cx   + '" y1="' + moundY + '"' +
              ' x2="' + tx.toFixed(1) + '" y2="' + ty.toFixed(1) + '"' +
              ' stroke="' + color + '" stroke-width="3.5"' +
              ' marker-end="url(#ah)" stroke-linecap="round"/>' +
        // Wind speed label next to arrowhead
        '<text x="' + (tx + dx*10).toFixed(1) + '"' +
              ' y="' + (ty + dy*10 + 3).toFixed(1) + '"' +
              ' font-size="9" fill="' + color + '" text-anchor="middle"' +
              ' font-weight="bold" font-family="Arial,sans-serif">' +
              windMph + 'mph</text>';
    }
  }

  // Compass rose: N marker rotated to match true north relative to field
  // In diagram, CF bearing points "up". So north points at (0 - cfBearing) relative to "up".
  var northDeg = ((0 - cfBearing) + 360) % 360;
  var nrad     = northDeg * Math.PI / 180;
  var nLen     = 11;
  var nex      = 18 + Math.sin(nrad) * nLen;
  var ney      = 18 - Math.cos(nrad) * nLen;

  return '<svg width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '"' +
         ' xmlns="http://www.w3.org/2000/svg">' +

    // Background
    '<rect width="' + W + '" height="' + H + '" fill="#1e3a0f" rx="7"/>' +

    // Outfield grass wedge
    '<path d="M ' + cx + ',' + hpY +
             ' L 12,' + (hpY-2) +
             ' Q ' + cx + ',8 ' + (W-12) + ',' + (hpY-2) +
             ' Z" fill="#2d5c16"/>' +

    // Infield dirt
    '<ellipse cx="' + cx + '" cy="' + (hpY-34) +
             '" rx="40" ry="33" fill="#b8773a"/>' +

    // Outfield wall arc
    '<path d="M 12,' + (hpY-2) + ' Q ' + cx + ',8 ' + (W-12) + ',' + (hpY-2) + '"' +
         ' fill="none" stroke="#fff" stroke-width="2.5" opacity="0.7"/>' +

    // Foul lines
    '<line x1="' + cx + '" y1="' + hpY + '" x2="12" y2="' + (hpY-2) + '"' +
          ' stroke="#fff" stroke-width="1.5" opacity="0.6"/>' +
    '<line x1="' + cx + '" y1="' + hpY + '" x2="' + (W-12) + '" y2="' + (hpY-2) + '"' +
          ' stroke="#fff" stroke-width="1.5" opacity="0.6"/>' +

    // Infield diamond
    '<polygon points="' + cx + ',' + hpY + ' ' +
                         (cx+26) + ',' + (hpY-28) + ' ' +
                         cx + ',' + (hpY-56) + ' ' +
                         (cx-26) + ',' + (hpY-28) +
                         '" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.85"/>' +

    // Pitcher mound
    '<circle cx="' + cx + '" cy="' + moundY + '" r="5" fill="#c98a42"/>' +

    // Home plate
    '<polygon points="' + cx + ',' + (hpY+4) + ' ' +
                          (cx+5) + ',' + hpY + ' ' +
                          (cx+5) + ',' + (hpY-5) + ' ' +
                          (cx-5) + ',' + (hpY-5) + ' ' +
                          (cx-5) + ',' + hpY +
              '" fill="#fff"/>' +

    // CF label
    '<text x="' + cx + '" y="20" font-size="8" fill="#ffffff99"' +
          ' text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold">CF</text>' +

    // Wind arrow
    arrowSVG +

    // Compass rose (top-left corner)
    '<circle cx="18" cy="18" r="13" fill="rgba(0,0,0,0.45)" stroke="#ffffff55" stroke-width="0.5"/>' +
    '<line x1="18" y1="18" x2="' + nex.toFixed(1) + '" y2="' + ney.toFixed(1) + '"' +
          ' stroke="#ef5350" stroke-width="2.2" stroke-linecap="round"/>' +
    '<circle cx="18" cy="18" r="2" fill="#fff" opacity="0.6"/>' +
    '<text x="' + (nex + Math.sin(nrad)*5).toFixed(1) + '"' +
          ' y="' + (ney - Math.cos(nrad)*5 + 3).toFixed(1) + '"' +
          ' font-size="7" fill="#ef5350" text-anchor="middle"' +
          ' font-weight="bold" font-family="Arial,sans-serif">N</text>' +

  '</svg>';
}

// ── Max HR Block ─────────────────────────────────────────────────────────────
function maxHRBlock(s) {
  if (!s.maxHR) return '';
  var mwx = s.maxHRWx;
  return '<div class="section-label">&#9976; SINGLE-GAME HR RECORD &middot; THIS PARK (2022-24)</div>' +
    '<div class="maxhr-section">' +
      '<div class="maxhr-header">' +
        '<div class="maxhr-title">&#128293; MOST HOME RUNS IN A GAME</div>' +
        '<div class="maxhr-date">' + s.maxHRDate + '</div>' +
      '</div>' +
      '<div class="maxhr-body">' +
        '<div class="maxhr-number">' + s.maxHR + '<span>HOME RUNS</span></div>' +
        '<div class="maxhr-conditions">' +
          '<div class="maxhr-cond-item"><span class="cv">' + mwx.temp + '&deg;F</span> Temp</div>' +
          '<div class="maxhr-cond-item"><span class="cv">' + mwx.wind + '</span> Wind</div>' +
          '<div class="maxhr-cond-item"><span class="cv">' + mwx.dir + '</span> Direction</div>' +
          '<div class="maxhr-sky"><span class="cv">' + mwx.sky + '</span> Sky Condition</div>' +
        '</div>' +
      '</div>' +
    '</div>';
}

// ── Main card generator ───────────────────────────────────────────────────────
function generateCard() {
  var key = document.getElementById('stadiumSelect').value;
  if (!key) { document.getElementById('statusMsg').textContent = '⚠️ Please select a stadium first.'; return; }
  document.getElementById('statusMsg').textContent = '';

  var s       = STADIUMS[key];
  var tempF   = parseFloat(document.getElementById('w_temp').value) || 75;
  var dewF    = parseFloat(document.getElementById('w_dew').value)  || 55;
  var windMph = parseFloat(document.getElementById('w_wind').value) || 0;
  var windDir = document.getElementById('w_dir').value;
  var skyKey  = document.getElementById('w_sky').value;
  var sky     = skyFromKey(skyKey);

  var homeHR9  = getPitcherHR9('p_home');
  var awayHR9  = getPitcherHR9('p_away');
  var homeName = getPitcherName('p_home');
  var awayName = getPitcherName('p_away');
  var impact  = computeImpact(tempF, windMph, windDir, skyKey, dewF, s);

  // ── Multiplicative model: park × pitcher × weather ────────────────────
  // Each factor is independent — no double-counting.
  // Park factor already bakes in average pitcher quality, so we
  // divide it out and replace with today's actual starters.
  //
  //   condHR = MLB_avg × (park/MLB_avg) × (pitcher/MLB_avg_pitcher) × weather_mult
  //          = MLB_avg × parkMult × pitcherMult × weatherMult
  //
  // Sanity check: avg pitching + neutral weather → condHR = parkHRPerGame ✓

  var parkHRMult   = s.parkHRPerGame   / MLB_AVG.hrPerGame;
  var parkRunMult  = s.parkRunsPerGame / MLB_AVG.runsPerGame;
  var parkKSMult   = s.parkKSPerGame   / MLB_AVG.ksPerGame;

  // Pitcher multiplier: avg of both starters vs MLB avg SP HR/9
  var pitcherMult  = ((homeHR9 + awayHR9) / 2) / MLB_AVG_HR9;

  // Weather multipliers (weather-only, no pitcher component)
  var wxHRMult     = 1 + impact.hrPct  / 100;
  var wxRunMult    = 1 + impact.runPct / 100;
  var wxKSMult     = 1 + impact.ksPct  / 100;

  var condHR   = parseFloat((MLB_AVG.hrPerGame   * parkHRMult  * pitcherMult * wxHRMult).toFixed(2));
  var condRuns = parseFloat((MLB_AVG.runsPerGame * parkRunMult * pitcherMult * wxRunMult).toFixed(2));
  var condKS   = parseFloat((MLB_AVG.ksPerGame   * parkKSMult  *              wxKSMult).toFixed(2));

  // Keep impact.hrPct reflecting combined weather+pitcher for display badges
  var pitchMod  = (pitcherMult - 1) * 100;
  impact.hrPct  = Math.round(impact.hrPct  + pitchMod);
  impact.runPct = Math.round(impact.runPct + pitchMod);

  var ou      = computeOU(impact.runPct, s.parkRunsPerGame);

  // ── HR Forecast ──────────────────────────────────────────────────────────
  // Poisson distribution: for a random variable with mean λ, std dev = √λ
  // Using 1.3σ below and 1.5σ above for an asymmetric "likely range"
  // (HR games skew right — easier to have more than fewer when conditions favor it)
  var poissSD  = Math.sqrt(condHR);
  var hrLow    = Math.max(0, Math.floor(condHR - poissSD * 1.3));
  var hrHigh   = Math.ceil(condHR + poissSD * 1.5);
  var hrRound  = Math.round(condHR * 10) / 10;

  // Environment label vs THIS park's baseline
  var parkRatio = condHR / s.parkHRPerGame;
  var envLabel  = parkRatio > 1.25 ? '🔥 High HR Game Expected'  :
                  parkRatio > 1.10 ? '📈 Above Park Average'      :
                  parkRatio > 0.90 ? '➡️ Near Park Average'       :
                  parkRatio > 0.75 ? '📉 Below Park Average'      :
                                     '❄️ Low HR Environment';

  // Show which factors are driving the forecast
  var drivers = [];
  if (Math.abs(impact.densityPct) >= 1.5) {
    drivers.push((impact.densityPct > 0 ? '↑' : '↓') + ' Air density ' + Math.abs(impact.densityPct) + '%');
  }
  if (Math.abs(impact.windOut) >= 3) {
    drivers.push((impact.windOut > 0 ? '↑' : '↓') + ' Wind ' + Math.abs(impact.windOut).toFixed(1) + ' mph ' + (impact.windOut > 0 ? 'out' : 'in'));
  }
  var driverStr = drivers.length > 0 ? 'Key factors: ' + drivers.join(' · ') : 'Conditions near park normal';

  var vsHRPct  = Math.round((condHR   / MLB_AVG.hrPerGame   - 1) * 100);
  var vsRunPct = Math.round((condRuns / MLB_AVG.runsPerGame  - 1) * 100);
  var vsKSPct  = Math.round((condKS   / MLB_AVG.ksPerGame    - 1) * 100);

  var lean    = ou.over > ou.under ? 'OVER LEAN ↑' : ou.under > ou.over ? 'UNDER LEAN ↓' : 'PUSH LEAN';
  var timeStr = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });

  // Physics strip values
  var densSign  = impact.densityPct >= 0 ? '+' : '';
  var densClass = impact.densityPct > 0 ? 'phys-pos' : impact.densityPct < 0 ? 'phys-neg' : 'phys-neu';
  var densLabel = impact.densityPct > 0.5 ? 'Ball carries farther' :
                  impact.densityPct < -0.5 ? 'Ball carries shorter' : 'Near normal';

  var windOutVal = impact.windOut;
  var windLabel, windClass;
  if (Math.abs(windOutVal) < 2.0) {
    windLabel = 'Crosswind'; windClass = 'phys-neu';
  } else if (windOutVal > 0) {
    windLabel = windOutVal.toFixed(1) + ' mph OUT to CF'; windClass = 'phys-pos';
  } else {
    windLabel = Math.abs(windOutVal).toFixed(1) + ' mph IN from CF'; windClass = 'phys-neg';
  }
  var windImpact = windOutVal > 2 ? 'Favors home runs' :
                   windOutVal < -2 ? 'Suppresses home runs' : 'Minimal HR effect';

  var homeModPct    = Math.round((homeHR9 / MLB_AVG_HR9 - 1) * 100);
  var awayModPct    = Math.round((awayHR9 / MLB_AVG_HR9 - 1) * 100);
  var pitchModRound = Math.round(pitchMod);
  var pitchModSign  = pitchModRound >= 0 ? '+' : '';
  var pitchLabel    = pitchModRound > 3  ? 'HR-prone matchup' :
                      pitchModRound < -3 ? 'HR-suppressing matchup' : 'Near avg pitching';

  document.getElementById('card').innerHTML =

    // Header
    '<div class="card-header">' +
      '<div class="matchup">' + s.abbr + ' · ' + s.name.toUpperCase() + '</div>' +
      '<div class="venue-time">AS OF ' + timeStr + ' · ' + s.city.toUpperCase() + '</div>' +
    '</div>' +

    // Weather
    '<div class="weather-row">' +
      '<div class="wx-icon">' + sky.icon + '</div>' +
      '<div class="wx-grid-disp">' +
        '<div class="wx-item"><span class="val">' + tempF + '°F</span></div>' +
        '<div class="wx-item"><span class="val">DEW ' + dewF + '°</span></div>' +
        '<div class="wx-item"><span class="val">' + windMph + ' mph</span></div>' +
        '<div class="wx-item"><span class="val">DIR ' + windDir + '</span></div>' +
      '</div>' +
      '<div class="wx-condition">' +
        '<div class="cond-label">' + sky.label.toUpperCase() + '</div>' +
        '<div class="sample">✍️ Manual Entry</div>' +
        '<div class="sample">Elev: ' + s.altFt.toLocaleString() + ' ft</div>' +
      '</div>' +
    '</div>' +

    // Pitcher strip
    '<div class="pitcher-row">' +
      '<div class="pitcher-box">' +
        '<span class="p-role">🏠 HOME SP</span>' +
        '<span class="p-name">' + homeName + '</span>' +
        '<span class="p-hr9">' + homeHR9.toFixed(2) + ' HR/9</span>' +
        '<span class="p-mod ' + (homeModPct > 3 ? 'pos' : homeModPct < -3 ? 'neg' : 'neu') + '">' + (homeModPct >= 0 ? '+' : '') + homeModPct + '% vs avg</span>' +
      '</div>' +
      '<div class="pitcher-combined">' +
        '<span class="pc-label">COMBINED</span>' +
        '<span class="pc-val">' + pitchModSign + pitchModRound + '%</span>' +
        '<span class="pc-sub">' + pitchLabel + '</span>' +
      '</div>' +
      '<div class="pitcher-box">' +
        '<span class="p-role">✈️ AWAY SP</span>' +
        '<span class="p-name">' + awayName + '</span>' +
        '<span class="p-hr9">' + awayHR9.toFixed(2) + ' HR/9</span>' +
        '<span class="p-mod ' + (awayModPct > 3 ? 'pos' : awayModPct < -3 ? 'neg' : 'neu') + '">' + (awayModPct >= 0 ? '+' : '') + awayModPct + '% vs avg</span>' +
      '</div>' +
    '</div>' +

    // Physics strip with stadium diagram
    '<div class="physics-row">' +
      '<div class="physics-diagram">' +
        drawStadiumSVG(windMph, windDir, s.cfBearing, impact.windOut) +
      '</div>' +
      '<div class="physics-stats">' +
        '<div class="phys-box">' +
          '<span class="phys-label">🔬 Air Density</span>' +
          '<span class="phys-value ' + densClass + '">' + densSign + impact.densityPct + '% vs park avg</span>' +
          '<span class="phys-sub">' + impact.rhoToday + ' kg/m³ · ' + densLabel + '</span>' +
        '</div>' +
        '<div class="phys-box">' +
          '<span class="phys-label">🧭 Wind Vector</span>' +
          '<span class="phys-value ' + windClass + '">' + windLabel + '</span>' +
          '<span class="phys-sub">CF bearing ' + s.cfBearing + '° · ' + windImpact + '</span>' +
        '</div>' +
      '</div>' +
    '</div>' +

    // HR Forecast Box
    '<div class="section-label">&#9976; HOME RUN FORECAST &middot; CURRENT CONDITIONS</div>' +
    '<div class="hr-forecast">' +
      '<span class="hrf-label">Most Likely Total HRs This Game</span>' +
      '<div>' +
        '<span class="hrf-number">' + hrRound + '</span>' +
        '<span class="hrf-unit">HOME RUNS</span>' +
      '</div>' +
      '<span class="hrf-range">Likely range: <strong>' + hrLow + ' – ' + hrHigh + '</strong> HRs &nbsp;|&nbsp; Park avg: ' + s.parkHRPerGame + ' HR/gm</span>' +
      '<div><span class="hrf-env">' + envLabel + '</span></div>' +
      '<span class="hrf-breakdown">' + driverStr + '</span>' +
    '</div>' +

    buildPoissonSection(condHR) +

    // Data quality badges
    '<div class="data-quality">' +
      '<span class="dq-badge dq-real">✅ REAL PARK FACTORS</span>' +
      '<span class="dq-badge dq-real">⚾ SP HR/9 · 2022–24</span>' +
      '<span class="dq-badge dq-phys">🔬 EMPIRICALLY CALIBRATED · n=1,171</span>' +
      '<span class="dq-badge dq-model">📐 R²=0.4% · Weather is 1 of many factors</span>' +
    '</div>' +

    // Impact boxes
    '<div class="section-label">WEATHER IMPACT VS THIS PARK</div>' +
    '<div class="impact-row">' +
      '<div class="impact-box ' + cls(impact.hrPct) + '">' +
        '<div class="impact-title">HOME RUNS</div>' +
        '<div class="impact-pct">' + pct(impact.hrPct) + '</div>' +
        '<div class="impact-sub">' +
          '<div class="sub-item hl"><span class="sv">' + condHR   + '</span>HR/gm today</div>' +
          '<div class="sub-item"><span class="sv">'   + s.parkHRPerGame   + '</span>HR/gm park</div>' +
        '</div>' +
      '</div>' +
      '<div class="impact-box ' + cls(impact.runPct) + '">' +
        '<div class="impact-title">RUNS</div>' +
        '<div class="impact-pct">' + pct(impact.runPct) + '</div>' +
        '<div class="impact-sub">' +
          '<div class="sub-item hl"><span class="sv">' + condRuns + '</span>R/gm today</div>' +
          '<div class="sub-item"><span class="sv">'   + s.parkRunsPerGame + '</span>R/gm park</div>' +
        '</div>' +
      '</div>' +
      '<div class="impact-box ' + cls(impact.ksPct) + '">' +
        '<div class="impact-title">STRIKEOUTS</div>' +
        '<div class="impact-pct">' + pct(impact.ksPct) + '</div>' +
        '<div class="impact-sub">' +
          '<div class="sub-item hl"><span class="sv">' + condKS   + '</span>KS/gm today</div>' +
          '<div class="sub-item"><span class="sv">'   + s.parkKSPerGame   + '</span>KS/gm park</div>' +
        '</div>' +
      '</div>' +
    '</div>' +

    // O/U
    '<div class="section-label">O/U TENDENCY</div>' +
    '<div class="ou-section">' +
      '<div class="ou-header">' +
        '<div class="ou-title">O/U TENDENCY</div>' +
        '<div class="ou-avg">avg. total ' + ou.avgTotal + '</div>' +
      '</div>' +
      '<div class="ou-bar-wrap">' +
        '<div class="ou-under" style="width:' + ou.under + '%">' +
          '<div class="ou-label">UNDER</div><div class="ou-pct">' + ou.under + '%</div>' +
        '</div>' +
        '<div class="ou-push" style="width:' + ou.push + '%">' +
          '<div class="ou-label">PUSH</div><div class="ou-pct">' + ou.push + '%</div>' +
        '</div>' +
        '<div class="ou-over">' +
          '<div class="ou-label">OVER</div><div class="ou-pct">' + ou.over + '%</div>' +
          '<div class="ou-lean">' + lean + '</div>' +
        '</div>' +
      '</div>' +
    '</div>' +

    // vs MLB avg
    '<div class="section-label">VS. MLB AVERAGE — ALL GAMES</div>' +
    '<div class="mlb-section">' +
      mlbRow('HR',   MLB_AVG.hrPerGame,   vsHRPct,  barW(vsHRPct))  +
      mlbRow('RUNS', MLB_AVG.runsPerGame, vsRunPct, barW(vsRunPct)) +
      mlbRow('KS',   MLB_AVG.ksPerGame,   vsKSPct,  barW(vsKSPct))  +
    '</div>' +



    buildSensitivitySection(s) +

    buildMarketSection(key, condHR) +

    maxHRBlock(s) +

    '<div class="data-note">' +
      '📊 Park data: 2022–24 park factors · 🔬 Empirical: n=1,171 games · r(density,HR)=0.03 · r(wind,HR)=0.06' +
    '</div>';

  document.getElementById('card').classList.add('visible');
}
</script>
